# =====================================================================
# 企业微信通知转发服务 - 本地构建模式编排模板
#
# 适用场景：
#   - 部署机能访问源码仓库，希望从本地源码构建镜像
#   - 开发 / 自测 / 需要定制 Dockerfile 的场景
#
# 特点：
#   - 使用 build 块从当前目录 Dockerfile 构建镜像
#   - 数据库挂载用 bind mount（./database），方便直接查看数据库文件
#   - 通过 .env 文件注入敏感配置（ENCRYPTION_KEY / ADMIN_PASSWORD）
#   - 包含健康检查，与镜像拉取模式行为一致
#
# 使用方法：
#   1. 复制本文件与 .env.example 到部署目录
#   2. cp .env.example .env 并修改 ENCRYPTION_KEY / ADMIN_PASSWORD
#   3. docker compose up -d --build
# =====================================================================

services:
  qywx-notifier-plus:
    # 从本地源码构建；构建产物同时打上 image 标签，便于后续复用
    build:
      context: .
      args:
        # 构建参数：注入镜像标签用于版本追溯（运行时映射为 APP_REVISION / APP_VERSION）
        VCS_REF: ${VCS_REF:-local}
        APP_VERSION: ${APP_VERSION:-2.0.0-dev}
    image: qywx-notifier-plus:local-build
    container_name: qywx-notifier-plus
    restart: unless-stopped

    # 端口映射：宿主机IP:宿主机端口:容器端口
    #   HOST_BIND：0.0.0.0 = 对外开放；127.0.0.1 = 仅本机（配合反向代理）
    #   HOST_PORT：宿主机端口，默认 12121，被占用时可改（如 8080）
    #   容器端口 12121 固定不动（由 Dockerfile EXPOSE 决定）
    ports:
      - "${HOST_BIND:-0.0.0.0}:${HOST_PORT:-12121}:12121"

    # 数据持久化：bind mount 本地目录，方便直接查看/备份数据库文件
    # 首次启动前请确保 ./database 目录存在（容器内以 node 用户运行，需可写）
    volumes:
      - ./database:/app/database

    # 运行时配置（值来自同目录 .env 文件）
    environment:
      PORT: 12121
      DB_PATH: /app/database/notifier.db
      NODE_ENV: production
      WECHAT_API_BASE: ${WECHAT_API_BASE:-https://qyapi.weixin.qq.com}
      # 【必填】加密密钥，32 字节。占位符会被启动校验拦截。
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?请先在 .env 中设置 ENCRYPTION_KEY}
      # 【必填】管理员密码，至少 8 字符。
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?请先在 .env 中设置 ADMIN_PASSWORD}
      # 反向代理：端口仍对公网开放时必须 false；仅在端口绑定回环后设 loopback 或跳数(1)/CIDR。
      TRUST_PROXY: ${TRUST_PROXY:-false}
      # 仅隔离测试实例设置随机且唯一的 16+ 字符值；生产环境留空。
      TEST_INSTANCE_ID: ${TEST_INSTANCE_ID:-}
      # ---- 以下为调优项，省略时用代码默认值，需要时在 .env 中开启 ----
      # CALLBACK_MAX_BODY_BYTES: 102400
      # LOGIN_RATE_MAX: 10
      # NOTIFY_RATE_MAX: 60
      # SHUTDOWN_TIMEOUT_MS: 10000

    # 健康检查（SEC-007）：就绪探测 /health/ready，仅 HTTP 200 视为健康。
    # 数据库不可用返回 503 时标记不健康。镜像内 Dockerfile 已内置同样配置。
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:12121/health/ready',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
