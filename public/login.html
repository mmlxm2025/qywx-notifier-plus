<!DOCTYPE html>
<html lang="zh-CN" data-theme="qywx">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 企业微信通知服务</title>
    <link rel="icon" href="/public/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/public/app.css">
    <link rel="stylesheet" href="/public/styles.css">
    <script defer src="/public/vendor/lucide.min.js"></script>
</head>
<body class="flex flex-col items-center justify-center p-3 sm:p-4 md:p-6 min-h-screen">
    <div class="w-full max-w-md min-w-0 glass-card p-5 sm:p-8">
        <div class="text-center mb-6 sm:mb-8">
            <!-- 头部图标：加 ring 提升层次（§4 elevation-consistent）。 -->
            <div class="inline-flex items-center justify-center w-14 h-14 sm:w-16 sm:h-16 rounded-full bg-primary/10 ring-4 ring-primary/5 mb-4">
                <i data-lucide="lock" class="icon-xl text-primary"></i>
            </div>
            <h1 class="app-type-page text-primary">管理登录</h1>
            <p class="app-type-lead text-base-content/60 mt-2">请输入管理员账号密码</p>
        </div>

        <div id="login-error" class="alert alert-error mb-4 hidden">
            <i data-lucide="alert-circle" class="icon-md"></i>
            <span id="error-message"></span>
        </div>

        <form id="loginForm" class="space-y-4">
            <div class="form-control">
                <label class="label" for="login-username">
                    <span class="label-text font-medium">用户名</span>
                </label>
                <input id="login-username" type="text" name="username" class="input input-bordered w-full" required placeholder="请输入用户名" autocomplete="username">
            </div>

            <div class="form-control">
                <label class="label" for="login-password">
                    <span class="label-text font-medium">密码</span>
                </label>
                <input id="login-password" type="password" name="password" class="input input-bordered w-full" required placeholder="请输入密码" autocomplete="current-password">
            </div>

            <button type="submit" class="btn btn-primary w-full gap-2">
                <i data-lucide="log-in" class="icon-md"></i>
                登录
            </button>
        </form>

        <div class="divider text-sm text-base-content/50">注意</div>
        <div class="alert alert-info text-sm">
            <i data-lucide="info" class="icon-sm"></i>
            <span>如未设置管理员，请配置环境变量 ADMIN_USERNAME 和 ADMIN_PASSWORD</span>
        </div>
    </div>

    <!-- SEC-011：内联脚本外置为独立文件，避免被 CSP script-src 拦截 -->
    <script src="/public/login.js"></script>
</body>
</html>
