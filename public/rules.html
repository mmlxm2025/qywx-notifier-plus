<!DOCTYPE html>
<html lang="zh-CN" data-theme="garden">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>接收规则配置</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@3.5.0/dist/full.css" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .glass-card {
            background: rgba(255, 255, 255, 0.86);
            backdrop-filter: blur(12px);
            border-radius: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.35);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.07);
        }
        body {
            background: linear-gradient(135deg, #e0f2fe 0%, #bef264 100%);
            min-height: 100vh;
        }
    </style>
</head>
<body class="min-h-screen p-4">
    <main class="w-full max-w-5xl mx-auto glass-card p-6 my-6">
        <header class="flex flex-col gap-4 md:flex-row md:items-center md:justify-between mb-6">
            <h1 class="text-2xl font-bold text-primary flex items-center gap-2">
                <i data-lucide="route" class="h-7 w-7"></i>
                接收规则配置
            </h1>
            <div class="flex gap-2">
                <a href="/" class="btn btn-sm btn-outline">
                    <i data-lucide="arrow-left" class="h-4 w-4"></i>
                    返回
                </a>
                <button type="button" id="logout-btn" class="btn btn-sm btn-outline btn-error">
                    <i data-lucide="log-out" class="h-4 w-4"></i>
                    登出
                </button>
            </div>
        </header>

        <section class="grid gap-4 md:grid-cols-[minmax(0,1fr)_auto] items-end mb-5">
            <label class="form-control">
                <span class="label-text font-medium mb-1">选择配置 Code</span>
                <select id="config-code" class="select select-bordered w-full"></select>
            </label>
            <button id="load-btn" type="button" class="btn btn-primary">
                <i data-lucide="search" class="h-5 w-5"></i>
                加载
            </button>
        </section>

        <div id="status" class="mb-4"></div>

        <section id="workspace" class="hidden grid gap-4 lg:grid-cols-[minmax(0,360px)_minmax(0,1fr)]">
            <form id="rule-form" class="card bg-base-100 shadow-sm">
                <div class="card-body gap-3">
                    <div class="flex items-center justify-between gap-3">
                        <h2 id="form-title" class="card-title text-base">新建规则</h2>
                        <button id="reset-form-btn" type="button" class="btn btn-xs btn-ghost">
                            <i data-lucide="plus" class="h-4 w-4"></i>
                            新建
                        </button>
                    </div>

                    <input type="hidden" id="rule-id">

                    <label class="form-control">
                        <span class="label-text font-medium mb-1">规则名称</span>
                        <input id="rule-name" class="input input-bordered input-sm" required autocomplete="off">
                    </label>

                    <label class="label cursor-pointer justify-start gap-3 px-0">
                        <input id="rule-all" type="checkbox" class="toggle toggle-primary toggle-sm">
                        <span class="label-text">全体人员</span>
                    </label>

                    <div id="custom-scope" class="space-y-3">
                        <div class="flex gap-2">
                            <input id="member-filter" class="input input-bordered input-sm flex-1" placeholder="筛选成员">
                            <button id="refresh-members-btn" type="button" class="btn btn-sm btn-outline" title="刷新成员">
                                <i data-lucide="refresh-cw" class="h-4 w-4"></i>
                            </button>
                        </div>
                        <div id="member-list" class="grid gap-2 max-h-52 overflow-y-auto rounded-md border border-base-200 p-2"></div>
                        <div id="orphan-section" class="hidden">
                            <div id="orphan-list" class="flex flex-wrap gap-2"></div>
                        </div>
                        <div class="grid grid-cols-2 gap-2">
                            <label class="form-control">
                                <span class="label-text text-xs mb-1">部门 ID</span>
                                <input id="rule-toparty" class="input input-bordered input-sm">
                            </label>
                            <label class="form-control">
                                <span class="label-text text-xs mb-1">标签 ID</span>
                                <input id="rule-totag" class="input input-bordered input-sm">
                            </label>
                        </div>
                    </div>

                    <label class="form-control">
                        <span class="label-text text-xs mb-1">预计人数</span>
                        <input id="estimated-count" type="number" min="1" class="input input-bordered input-sm" value="1">
                    </label>

                    <div id="form-error" class="alert alert-error hidden py-2 text-sm"></div>

                    <button id="save-rule-btn" type="submit" class="btn btn-primary btn-sm">
                        <i data-lucide="save" class="h-4 w-4"></i>
                        保存
                    </button>
                </div>
            </form>

            <section class="card bg-base-100 shadow-sm">
                <div class="card-body">
                    <div class="flex items-center justify-between gap-3">
                        <h2 class="card-title text-base">规则列表</h2>
                        <button id="reload-rules-btn" type="button" class="btn btn-xs btn-outline">
                            <i data-lucide="rotate-cw" class="h-4 w-4"></i>
                            重载
                        </button>
                    </div>
                    <div id="rules-list" class="overflow-x-auto"></div>
                </div>
            </section>
        </section>
    </main>

    <script src="/public/rules.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
