<!DOCTYPE html>
<html lang="zh-CN" data-theme="qywx">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>接收规则 · 企业微信通知服务</title>
    <link rel="icon" href="/public/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/public/app.css">
    <link rel="stylesheet" href="/public/styles.css">
    <script defer src="/public/vendor/lucide.min.js"></script>
</head>
<body class="p-4">
    <div class="w-full max-w-5xl min-w-0 mx-auto my-4">
        <div id="app-topnav" data-active="rules" class="glass-card p-4 mb-4"></div>

        <div class="glass-card min-w-0 p-6">
            <header class="flex items-center justify-between flex-wrap gap-3 mb-4">
                <h1 class="text-2xl font-bold flex items-center gap-2">
                    <i data-lucide="route" class="h-7 w-7 text-primary"></i>
                    接收规则
                </h1>
            </header>

            <section class="grid gap-4 md:grid-cols-[minmax(0,1fr)_auto] items-end mb-5">
                <label class="form-control">
                    <span class="label-text font-medium mb-1">选择配置 Code</span>
                    <select id="config-code" class="select select-bordered w-full"></select>
                </label>
                <button id="load-btn" type="button" class="btn btn-primary">
                    <i data-lucide="search" class="h-5 w-5"></i>
                    加载
                </button>
            </section>

            <div id="status" class="mb-4"></div>

            <!-- 多应用（§7.4 / §3.6 P1-02）：当前应用上下文与状态横幅。
                 配置级安全设置（Code 发送开关 / 通知密钥）唯一在编辑页管理，规则页不再重复。 -->
            <section id="app-context" class="hidden mb-4 alert alert-info text-sm flex flex-col gap-1">
                <div class="flex items-center gap-2 flex-wrap">
                    <i data-lucide="building-2" class="h-5 w-5"></i>
                    <span id="app-context-name" class="font-medium">—</span>
                    <span class="text-base-content/60">·</span>
                    <span id="app-context-agentid" class="text-base-content/70">AgentID —</span>
                    <span id="app-context-status" class="app-badge app-badge--active">—</span>
                </div>
                <div class="flex items-center gap-2 flex-wrap text-xs">
                    <span id="app-context-warn" class="hidden text-error"></span>
                    <a id="app-context-edit-security" href="#" class="app-link-on-info link">在编辑页管理安全设置（Code 发送开关 / 通知密钥）</a>
                </div>
            </section>

            <section id="workspace" class="hidden min-w-0 grid gap-4">
                <div class="min-w-0 grid gap-4 lg:grid-cols-[minmax(0,360px)_minmax(0,1fr)]">
                    <form id="rule-form" class="min-w-0 bg-base-100/70 rounded-xl p-4 border border-base-200">
                        <div class="flex items-center justify-between gap-3">
                            <h2 id="form-title" class="text-base font-semibold">新建规则</h2>
                            <button id="reset-form-btn" type="button" class="btn btn-xs btn-ghost gap-1">
                                <i data-lucide="plus" class="icon-sm"></i>
                                新建
                            </button>
                        </div>

                        <input type="hidden" id="rule-id">

                        <label class="form-control mt-3">
                            <span class="label-text font-medium mb-1">规则名称</span>
                            <input id="rule-name" class="input input-bordered input-sm" required autocomplete="off">
                        </label>

                        <div class="form-control min-w-0 mt-3">
                            <label for="rule-api-code" class="label-text font-medium mb-1">API 自定义编号</label>
                            <div class="join min-w-0 w-full">
                                <span class="join-item bg-base-200 border border-base-300 flex items-center px-3 h-9 text-xs text-base-content/60 select-none font-mono" aria-hidden="true">/api/notify/</span>
                                <input id="rule-api-code" class="join-item input input-bordered input-sm min-w-0 w-0 flex-1 font-mono h-9"
                                    maxlength="64" autocomplete="off" spellcheck="false"
                                    placeholder="留空将自动生成，或点击右侧随机"
                                    aria-describedby="rule-api-code-help rule-api-code-status">
                                <button id="rule-api-code-random" type="button" class="join-item btn btn-sm btn-outline h-9 gap-1" title="随机生成编号" aria-label="随机生成编号">
                                    <i data-lucide="shuffle" class="icon-sm"></i>
                                    随机
                                </button>
                            </div>
                            <p id="rule-api-code-help" class="text-xs text-base-content/60 mt-1">
                                3～64 位小写字母、数字、-、_；新建留空将自动生成，编辑时清空后请点击“随机”生成新编号
                            </p>
                            <p id="rule-api-code-status" class="text-xs mt-1 hidden" role="status" aria-live="polite"></p>
                            <p class="text-xs text-base-content/50 mt-1 flex items-start gap-1">
                                <i data-lucide="shield-alert" class="icon-xs mt-0.5 flex-shrink-0"></i>
                                <span>自定义编号便于记忆，但不是密码。公网使用时请在应用安全设置中启用通知密钥。</span>
                            </p>
                        </div>

                        <label class="label cursor-pointer justify-start gap-3 px-0">
                            <input id="rule-all" type="checkbox" class="toggle toggle-primary toggle-sm">
                            <span class="label-text">全体人员</span>
                        </label>

                        <div id="custom-scope" class="space-y-3">
                            <div class="flex gap-2">
                                <input id="member-filter" class="input input-bordered input-sm min-w-0 flex-1" placeholder="筛选成员" aria-label="筛选成员">
                                <button id="refresh-members-btn" type="button" class="btn btn-sm btn-outline" title="刷新成员" aria-label="刷新成员">
                                    <i data-lucide="refresh-cw" class="icon-sm"></i>
                                </button>
                            </div>
                            <div id="member-list" class="grid gap-2 max-h-52 overflow-y-auto rounded-md border border-base-200 p-2"></div>
                            <div id="orphan-section" class="hidden">
                                <div id="orphan-list" class="flex flex-wrap gap-2"></div>
                            </div>
                            <div class="grid grid-cols-2 gap-2">
                                <label class="form-control">
                                    <span class="label-text text-xs mb-1">部门 ID</span>
                                    <input id="rule-toparty" class="input input-bordered input-sm">
                                </label>
                                <label class="form-control">
                                    <span class="label-text text-xs mb-1">标签 ID</span>
                                    <input id="rule-totag" class="input input-bordered input-sm">
                                </label>
                            </div>
                        </div>

                        <label class="form-control">
                            <span class="label-text text-xs mb-1">预计人数</span>
                            <input id="estimated-count" type="number" min="1" class="input input-bordered input-sm" value="1">
                        </label>

                        <div id="form-error" class="alert alert-error hidden py-2 text-sm"></div>

                        <button id="save-rule-btn" type="submit" class="btn btn-primary btn-sm gap-1.5">
                            <i data-lucide="save" class="icon-sm"></i>
                            保存
                        </button>
                    </form>

                    <section class="min-w-0 bg-base-100/70 rounded-xl p-4 border border-base-200">
                        <div class="flex items-center justify-between gap-3">
                            <h2 class="text-base font-semibold flex items-center gap-1.5">
                                <i data-lucide="list" class="icon-sm text-base-content/60"></i>
                                规则列表
                            </h2>
                            <button id="reload-rules-btn" type="button" class="btn btn-xs btn-outline gap-1">
                                <i data-lucide="refresh-cw" class="icon-sm"></i>
                                重载
                            </button>
                        </div>
                        <div id="rules-list" class="overflow-x-auto mt-3"></div>
                    </section>
                </div>
            </section>
        </div>
    </div>

    <!-- SEC-011：脚本外置。多应用（P1-02）：接入统一 styles/topnav/http/modal/toast，移除重复安全设置。 -->
    <script src="/public/components/toast.js"></script>
    <script src="/public/components/modal.js"></script>
    <script src="/public/http.js"></script>
    <script src="/public/frontend-helpers.js"></script>
    <script src="/public/topnav.js"></script>
    <script src="/public/rules.js"></script>
</body>
</html>
