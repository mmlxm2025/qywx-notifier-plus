name: Test and publish Docker image (feature/multi-app)

# 仅 feature/multi-app 分支推送时触发：运行测试 + 构建 feature/multi-app 标签镜像到 GHCR，
# 供联调与集成验证。正式版（latest / tag）仍由 docker-publish.yml 在 main / tag 上发布；
# dev 测试镜像由 docker-publish-dev.yml 在 dev 分支上发布。

on:
  push:
    branches:
      - feature/multi-app
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: mmlxm2025/qywx-notifier-plus

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - name: Node/npm versions
        run: |
          node --version
          npm --version
      - name: Install dependencies
        run: npm ci
      # npm test 默认用 --test-isolation=none，规避 Node 24 test_runner 在
      # 默认 process 隔离下的 IPC 序列化缺陷（nodejs issue #64061）。
      # 进程隔离模式可用 npm run test:isolated 跟踪上游修复进展。
      - name: Run tests
        run: npm test
      # 生产依赖审计门禁：0 high/critical
      - name: Production dependency audit (0 high/critical)
        run: npm audit --omit=dev

  docker:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # feature/multi-app 分支固定打 feature/multi-app 标签，每次推送覆盖
          tags: |
            type=raw,value=feature/multi-app
          labels: |
            org.opencontainers.image.title=qywx-notifier-plus (feature/multi-app)
            org.opencontainers.image.description=企业微信通知转发服务 - feature/multi-app 集成镜像
      - name: Build and publish image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=feature
          cache-to: type=gha,scope=feature,mode=max
