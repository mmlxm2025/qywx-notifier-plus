name: Test and publish Docker image

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: mmlxm2025/qywx-notifier-plus

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - name: Node/npm versions
        run: |
          node --version
          npm --version
      - name: Install dependencies
        run: npm ci
      # npm test 默认用 --test-isolation=none，规避 Node 24 test_runner IPC
      # 序列化缺陷（nodejs issue #64061）。
      - name: Run tests
        run: npm test
      # 生产依赖审计门禁：0 high/critical
      - name: Production dependency audit (0 high/critical)
        run: npm audit --omit=dev

  docker:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
      - name: Read application version
        id: app
        # 用多行脚本避免 YAML 单行嵌套转义把括号解析坏（历史：syntax error near unexpected token '('）
        run: |
          version=$(node -p "require('./package.json').version")
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=tag
            type=sha,prefix=sha-
      - name: Build and publish image
        uses: docker/build-push-action@v7
        with:
          context: .
          build-args: |
            VCS_REF=${{ github.sha }}
            APP_VERSION=${{ steps.app.outputs.version }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
